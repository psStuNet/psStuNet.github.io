            // 新版粒子系统（精简，保留核心功能）
            function initNewParticles() {
                const canvas = document.getElementById('particles');
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let particles = [];
                let animationFrame;

                function resizeCanvas() {
                    canvas.width = window.innerWidth;
                    canvas.height = window.innerHeight;
                }

                function createParticle() {
                    return {
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        vx: (Math.random() - 0.5) * 0.5,
                        vy: (Math.random() - 0.5) * 0.5,
                        size: Math.random() * 2 + 1,
                        alpha: Math.random() * 0.5 + 0.2,
                        color: `hsla(${170 + Math.random() * 40}, 100%, 60%, `
                    };
                }

                function initParticles() {
                    particles = [];
                    for (let i = 0; i < 100; i++) {
                        particles.push(createParticle());
                    }
                }

                function animateParticles() {
                    if (!canvas || !ctx) return;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    particles.forEach(p => {
                        p.x += p.vx;
                        p.y += p.vy;
                        if (p.x < 0) p.x = canvas.width;
                        if (p.x > canvas.width) p.x = 0;
                        if (p.y < 0) p.y = canvas.height;
                        if (p.y > canvas.height) p.y = 0;

                        ctx.beginPath();
                        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                        ctx.fillStyle = p.color + p.alpha + ')';
                        ctx.fill();

                        particles.forEach(other => {
                            const dx = p.x - other.x;
                            const dy = p.y - other.y;
                            const dist = Math.sqrt(dx * dx + dy * dy);
                            if (dist < 150) {
                                ctx.beginPath();
                                ctx.moveTo(p.x, p.y);
                                ctx.lineTo(other.x, other.y);
                                ctx.strokeStyle = `rgba(0, 255, 200, ${0.15 * (1 - dist / 150)})`;
                                ctx.stroke();
                            }
                        });
                    });
                    animationFrame = requestAnimationFrame(animateParticles);
                }

                resizeCanvas();
                initParticles();
                animateParticles();

                window.addEventListener('resize', () => {
                    if (!canvas) return;
                    resizeCanvas();
                    initParticles();
                });

                // 保存以便清理（切换主题时可取消动画）
                window.__newParticlesCleanup = () => {
                    if (animationFrame) cancelAnimationFrame(animationFrame);
                };
            }

                    const size = 30 + Math.random() * 50;
                    shape.style.width = size + 'px';
                    shape.style.height = size + 'px';

                    shape.style.animationDelay = (i * 2) + 's';
                    shape.style.animationDuration = (15 + Math.random() * 10) + 's';
                    container.appendChild(shape);
                });
            }

                        </div>
                        <div class="tools-menu">
                            <a href="https://ps-student-catalog-team.github.io/VPN_logs_anal/" class="tool-item" data-tooltip="VPN日志分析">
                                <svg class="tool-icon" viewBox="0 0 24 24">
                                    <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V5h14v14z"/>
                                    <path d="M7.5 15h2v2H11v-4H9.5v2.5h-2V15zm6.5 0h4v2h-4z"/>
                                </svg>
                            </a>
                            <a href="https://github.com/psStuNet/psStuNet.github.io" class="tool-item" data-tooltip="GitHub仓库">
                                <svg class="tool-icon" viewBox="0 0 24 24">
                                    <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.793-.258.793-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
                                </svg>
                            </a>
                        </div>
                    </div>
                `;

                appContainer.innerHTML = html;

                const timeline = document.getElementById('oldTimeline');

                // 根据 logs 生成旧版 .log-item
                logs.forEach((log, index) => {
                    const item = document.createElement('div');
                    item.className = 'log-item';
                    item.style.animationDelay = `${0.2 + index * 0.1}s`;
                    item.style.cursor = 'pointer';
                    item.dataset.category = log.category;

                    let contentHtml = '';
                    if (log.category === 'report') {
                        contentHtml = `<p>${log.desc}</p>
                                       ${log.link ? `<a href="${log.link}" class="month-report-link">查看完整月度报告 →</a>` : ''}`;
                    } else if (log.category === 'server' && log.title.includes('VPN')) {
                        contentHtml = `<p>点击查看<a class="link" href="https://ps-student-catalog-team.github.io/VPN_logs_anal/" target="_blank">VPN连接统计报告</a></p>
                                       <p>自动分析VPN连接数据</p>`;
                    } else if (log.category === 'server' && log.title.includes('Minecraft')) {
                        contentHtml = `<p>✅ 完成我的世界1.21.5的Mc服务器搭建</p>
                                       <p>✅ 使用Fabric的插件实现支持使用正版皮肤</p>
                                       <p>✅ 通过Radmin实现服务器外网访问</p>`;
                    } else if (log.category === 'bugfix') {
                        contentHtml = `<p>🔧 修复了会话数统计功能的一些bug</p>`;
                    } else if (log.category === 'progress') {
                        contentHtml = log.content.split('<br>').map(line => `<p>${line}</p>`).join('');
                    } else if (log.category === 'github') {
                        contentHtml = `<p>点击访问<a class="link" href="https://github.com/psStuNet/psStuNet.github.io" target="_blank">GitHub 仓库</a></p>
                                       <p>点击访问<a class="link" href="https://github.com/Ps-Student-Catalog-Team/Ps-Student-Catalog" target="_blank">学生目录的 GitHub仓库</a></p>
                                       <p>Contributors: <a class="link" href="https://github.com/psStuNet/psStuNet.github.io/graphs/contributors" target="_blank">Check on Github</a></p>
                                       <a class="link" href="https://github.com/psstunet/psstunet.github.io/commits">查看commit记录</a>`;
                    } else {
                        contentHtml = `<p>${log.desc}</p>`;
                    }

                    item.innerHTML = `
                        <div class="log-date">${getCategoryName(log.category)} - ${log.date}</div>
                        <div class="log-content">
                            ${contentHtml}
                        </div>
                    `;

                    // 点击跳转（部分条目有链接）
                    item.addEventListener('click', (e) => {
                        if (e.target.closest('a')) return; // 链接已处理
                        if (log.link && !log.link.startsWith('http')) {
                            window.location.href = log.link;
                        }
                    });

                    timeline.appendChild(item);
                });

                // 旧版筛选功能
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        const category = btn.dataset.category;
                        document.querySelectorAll('.log-item').forEach(item => {
                            if (category === 'all' || item.dataset.category === category) {
                                item.style.display = 'block';
                            } else {
                                item.style.display = 'none';
                            }
                        });
                    });
                });

                // 旧版工具集交互
                window.toggleOldTools = function() {
                    const menu = document.querySelector('.tools-menu');
                    if (menu) {
                        menu.classList.toggle('active');
                    }
                };

                document.addEventListener('click', function oldToolsClose(e) {
                    const container = document.querySelector('.tools-container');
                    if (container && !container.contains(e.target)) {
                        const menu = document.querySelector('.tools-menu');
                        if (menu) menu.classList.remove('active');
                    }
                });
            }

            // 初始化
            function init() {
                const savedTheme = localStorage.getItem(STORAGE_KEY) || 'new';
                setTheme(savedTheme);
                themeToggle.addEventListener('click', toggleTheme);
            }

            init();
        })();
    </script>
</body>
</html>
