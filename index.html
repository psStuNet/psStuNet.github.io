<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>学生目录</title>
    <link rel="icon" type="image/png" href="./img/icon/favicon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: #050508;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 粒子背景 */
        #particles-container {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        canvas {
            display: block;
        }

        /* 全息扫描线 */
        .scanlines {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0, 255, 200, 0.03) 2px,
                rgba(0, 255, 200, 0.03) 4px
            );
            z-index: 1;
            pointer-events: none;
            animation: scan 8s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100px); }
        }

        /* 全息网格 */
        .holo-grid {
            position: fixed;
            inset: 0;
            background: 
                linear-gradient(rgba(0, 255, 200, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 200, 0.05) 1px, transparent 1px);
            background-size: 80px 80px;
            z-index: 0;
            pointer-events: none;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: center top;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 80px; }
        }

        /* 浮动装饰元素 */
        .floating-decorations {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            overflow: hidden;
        }

        .float-shape {
            position: absolute;
            border: 1px solid rgba(0, 255, 200, 0.15);
            animation: floatShape 20s ease-in-out infinite;
        }

        .float-shape.circle {
            border-radius: 50%;
        }

        .float-shape.diamond {
            transform: rotate(45deg);
        }

        .float-shape.ring {
            border-radius: 50%;
            background: transparent;
        }

        .float-shape.cross::before,
        .float-shape.cross::after {
            content: '';
            position: absolute;
            background: rgba(0, 255, 200, 0.15);
        }

        .float-shape.cross::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
        }

        .float-shape.cross::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }

        @keyframes floatShape {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.3; }
            25% { transform: translateY(-30px) rotate(90deg); opacity: 0.6; }
            50% { transform: translateY(-10px) rotate(180deg); opacity: 0.4; }
            75% { transform: translateY(-40px) rotate(270deg); opacity: 0.5; }
        }

        /* 角落装饰 */
    .corner-decor {
        position: fixed;
        width: 200px;
        height: 200px;
        z-index: 3;
        pointer-events: none;
    }

    .corner-decor.top-left {
        top: 0;
        left: 0;
        border-top: 2px solid rgba(0, 255, 200, 0.3);
        border-left: 2px solid rgba(0, 255, 200, 0.3);
    }

    .corner-decor.top-right {
        top: 0;
        right: 0;
        border-top: 2px solid rgba(0, 255, 200, 0.3);
        border-right: 2px solid rgba(0, 255, 200, 0.3);
    }

    .corner-decor.bottom-left {
        bottom: 0;
        left: 0;
        border-bottom: 2px solid rgba(0, 255, 200, 0.3);
        border-left: 2px solid rgba(0, 255, 200, 0.3);
    }

    .corner-decor.bottom-right {
        bottom: 0;
        right: 0;
        border-bottom: 2px solid rgba(0, 255, 200, 0.3);
        border-right: 2px solid rgba(0, 255, 200, 0.3);
    }

    .corner-decor::before,
    .corner-decor::after {
        content: '';
        position: absolute;
        background: rgba(0, 255, 200, 0.3);
    }

    .corner-decor.top-left::before,
    .corner-decor.bottom-left::before {
        width: 1px;
        height: 80px;
        top: 40px;
        left: 40px;
    }

    .corner-decor.top-left::after,
    .corner-decor.top-right::after {
        width: 80px;
        height: 1px;
        top: 40px;
        left: 40px;
    }

    .corner-decor.top-right::before,
    .corner-decor.bottom-right::before {
        width: 1px;
        height: 80px;
        top: 40px;
        right: 40px;
    }

    .corner-decor.bottom-right::after,
    .corner-decor.bottom-left::after {
        width: 80px;
        height: 1px;
        bottom: 40px;
        right: 40px;
    }

    .corner-decor.bottom-left::after {
        left: 40px;
    }

    .corner-decor.bottom-right::after {
        right: 40px;
    }

    /* 光晕球体 */
    .glow-orbs {
        position: fixed;
        inset: 0;
        z-index: 1;
        pointer-events: none;
    }

    .glow-orb {
        position: absolute;
        border-radius: 50%;
        animation: orbFloat 15s ease-in-out infinite;
    }

    .glow-orb-1 {
        width: 300px;
        height: 300px;
        background: radial-gradient(circle, rgba(0, 255, 200, 0.15) 0%, transparent 70%);
        top: 20%;
        left: 10%;
    }

    .glow-orb-2 {
        width: 250px;
        height: 250px;
        background: radial-gradient(circle, rgba(0, 212, 255, 0.12) 0%, transparent 70%);
        top: 60%;
        right: 5%;
        animation-delay: -5s;
    }

    .glow-orb-3 {
        width: 200px;
        height: 200px;
        background: radial-gradient(circle, rgba(139, 92, 246, 0.1) 0%, transparent 70%);
        bottom: 20%;
        left: 30%;
        animation-delay: -10s;
    }

    @keyframes orbFloat {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(30px, -20px); }
        50% { transform: translate(-20px, 30px); }
        75% { transform: translate(20px, 20px); }
    }

    /* 数据流装饰 */
    .data-stream {
        position: fixed;
        width: 2px;
        height: 100px;
        background: linear-gradient(to bottom, transparent, rgba(0, 255, 200, 0.5), transparent);
        z-index: 2;
        pointer-events: none;
        animation: dataFlow 8s linear infinite;
    }

    @keyframes dataFlow {
        0% { transform: translateY(-100px); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(100vh); opacity: 0; }
    }

        /* 头部 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            padding: 24px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(5, 5, 8, 0.95), transparent);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, #00ffc8, #00d4ff, #ff00e0);
            background-size: 200% 200%;
            animation: gradientRotate 3s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            box-shadow: 
                0 0 30px rgba(0, 255, 200, 0.4),
                0 0 60px rgba(0, 212, 255, 0.2);
        }

        @keyframes gradientRotate {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .logo-text h1 {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(90deg, #00ffc8, #00d4ff, #ff00e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-text p {
            font-size: 0.8rem;
            color: rgba(0, 255, 200, 0.6);
        }

        .nav-links {
            display: flex;
            gap: 12px;
        }

        .nav-link {
            padding: 10px 22px;
            border-radius: 100px;
            font-size: 0.85rem;
            color: rgba(0, 255, 200, 0.8);
            text-decoration: none;
            border: 1px solid rgba(0, 255, 200, 0.3);
            background: rgba(0, 255, 200, 0.05);
            transition: all 0.3s;
        }

        .nav-link:hover {
            background: rgba(0, 255, 200, 0.15);
            border-color: rgba(0, 255, 200, 0.6);
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.3);
        }

        .nav-link.primary {
            background: linear-gradient(135deg, #00ffc8, #00d4ff);
            color: #050508;
            border: none;
            font-weight: 600;
        }

        .nav-link.primary:hover {
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.5);
        }

        /* 分类选择器 - 悬浮光环 */
        .category-orbit {
            position: fixed;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .orbit-node {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: rgba(0, 255, 200, 0.3);
            cursor: pointer;
            position: relative;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
        }

        .orbit-node::before {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 200, 0.3);
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.4s;
        }

        .orbit-node:hover::before {
            opacity: 1;
            transform: scale(1.2);
        }

        .orbit-node.active {
            background: #00ffc8;
            box-shadow: 0 0 20px rgba(0, 255, 200, 0.6);
        }

        .orbit-node.active::before {
            opacity: 1;
            transform: scale(1.5);
            border-color: rgba(0, 255, 200, 0.5);
        }

        .orbit-label {
            position: absolute;
            left: 36px;
            white-space: nowrap;
            font-size: 0.8rem;
            color: rgba(0, 255, 200, 0.9);
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.3s;
        }

        .orbit-node:hover .orbit-label,
        .orbit-node.active .orbit-label {
            opacity: 1;
            transform: translateX(0);
        }

        /* 时间胶囊容器 */
        .capsules-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 140px 40px 80px;
            position: relative;
            z-index: 10;
        }

        /* 时间轴线 */
        .timeline-core {
            position: absolute;
            left: 50%;
            top: 140px;
            bottom: 80px;
            width: 2px;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 200, 0.5), transparent);
            transform: translateX(-50%);
        }

        .timeline-glow {
            position: absolute;
            left: 50%;
            top: 140px;
            bottom: 80px;
            width: 100px;
            background: radial-gradient(ellipse, rgba(0, 255, 200, 0.15) 0%, transparent 70%);
            transform: translateX(-50%);
            pointer-events: none;
        }

        /* 时间胶囊 */
        .time-capsule {
            margin-bottom: 60px;
            position: relative;
            perspective: 1200px;
        }

        .capsule-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .capsule-node {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #050508;
            border: 3px solid #00ffc8;
            position: relative;
            z-index: 2;
            flex-shrink: 0;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.5);
        }

        .capsule-node::before {
            content: '';
            position: absolute;
            inset: -12px;
            border-radius: 50%;
            border: 1px solid rgba(0, 255, 200, 0.4);
            animation: pulseRing 2s ease-out infinite;
        }

        @keyframes pulseRing {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .capsule-card {
            width: 380px;
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.1), rgba(0, 212, 255, 0.05));
            border: 1px solid rgba(0, 255, 200, 0.3);
            border-radius: 20px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            transform-style: preserve-3d;
            transform: perspective(1000px) rotateX(0) rotateY(0);
        }

        .time-capsule:nth-child(odd) .capsule-card {
            margin-right: 40px;
            transform-origin: right center;
        }

        .time-capsule:nth-child(even) .capsule-card {
            margin-left: 40px;
            transform-origin: left center;
        }

        .capsule-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 22px;
            background: linear-gradient(135deg, var(--color-1, #00ffc8), var(--color-2, #00d4ff), transparent, var(--color-1, #00ffc8));
            background-size: 300% 300%;
            opacity: 0;
            z-index: -1;
            transition: opacity 0.3s;
            animation: borderGlow 4s ease infinite;
        }

        @keyframes borderGlow {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .capsule-card:hover::before {
            opacity: 1;
        }

        .capsule-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .capsule-card:hover::after {
            left: 100%;
        }

        .capsule-card:hover {
            transform: perspective(1000px) rotateX(5deg) rotateY(-2deg) translateZ(20px) scale(1.02);
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.4),
                0 0 40px rgba(0, 255, 200, 0.3),
                0 0 80px rgba(0, 212, 255, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            border-color: rgba(0, 255, 200, 0.6);
        }

        .time-capsule:nth-child(even) .capsule-card:hover {
            transform: perspective(1000px) rotateX(5deg) rotateY(2deg) translateZ(20px) scale(1.02);
        }

        /* 胶囊头部 */
        .capsule-header {
            padding: 28px 28px 20px;
            position: relative;
            overflow: hidden;
        }

        .capsule-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--color-1, #00ffc8) 0%, var(--color-2, #00d4ff) 100%);
            opacity: 0.15;
        }

        .capsule-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
            margin-bottom: 16px;
        }

        .capsule-category {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: rgba(0, 255, 200, 0.15);
            border: 1px solid rgba(0, 255, 200, 0.4);
            color: #00ffc8;
        }

        .capsule-date {
            font-size: 0.85rem;
            color: rgba(0, 255, 200, 0.7);
        }

        .capsule-title {
            position: relative;
            font-size: 1.5rem;
            font-weight: 700;
            line-height: 1.3;
        }

        /* 胶囊主体 */
        .capsule-body {
            padding: 0 28px;
            max-height: 0;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .capsule-card.expanded .capsule-body {
            padding: 20px 28px 28px;
            max-height: 500px;
        }

        .capsule-desc {
            font-size: 0.95rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.7;
            margin-bottom: 20px;
        }

        .capsule-content {
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.8;
            padding: 16px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 200, 0.2);
        }

        .capsule-content a {
            color: #00ffc8;
            text-decoration: none;
        }

        .capsule-content a:hover {
            text-decoration: underline;
        }

        .capsule-actions {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 24px;
            border-radius: 100px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #00ffc8, #00d4ff);
            color: #050508;
        }

        .btn-primary:hover {
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.5);
        }

        .btn-secondary {
            background: rgba(0, 255, 200, 0.1);
            color: #00ffc8;
            border: 1px solid rgba(0, 255, 200, 0.4);
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 200, 0.2);
        }

        /* 胶囊图标角标 */
        .capsule-icon {
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            font-size: 3rem;
            opacity: 0.2;
            transform: rotate(15deg);
        }

        .expand-hint {
            position: absolute;
            bottom: 12px;
            right: 28px;
            font-size: 0.75rem;
            color: rgba(0, 255, 200, 0.6);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .expand-hint svg {
            transition: transform 0.3s;
        }

        .capsule-card.expanded .expand-hint svg {
            transform: rotate(180deg);
        }

        /* 页码指示器 */
        .page-indicator {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }

        .page-num {
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 1.2rem;
            color: rgba(0, 255, 200, 0.8);
            font-weight: 600;
        }

        .page-slash {
            font-size: 0.8rem;
            color: rgba(0, 255, 200, 0.4);
        }

        .page-total {
            font-size: 0.9rem;
            color: rgba(0, 255, 200, 0.5);
        }

        /* 滚动提示 */
        .scroll-indicator {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            color: rgba(0, 255, 200, 0.7);
            font-size: 0.8rem;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(10px); }
        }

        /* 浮动工具集 */
        .floating-tools {
            position: fixed;
            right: 40px;
            bottom: 40px;
            z-index: 200;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-btn {
            width: 52px;
            height: 52px;
            border-radius: 16px;
            background: linear-gradient(135deg, rgba(0, 255, 200, 0.15), rgba(0, 212, 255, 0.1));
            border: 1px solid rgba(0, 255, 200, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .tool-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #00ffc8, #00d4ff);
            opacity: 0;
            transition: opacity 0.3s;
        }

        .tool-btn span {
            position: relative;
            z-index: 1;
        }

        .tool-btn:hover::before {
            opacity: 0.2;
        }

        .tool-btn:hover {
            transform: scale(1.1) translateY(-4px);
            box-shadow: 
                0 10px 40px rgba(0, 255, 200, 0.3),
                0 0 20px rgba(0, 255, 200, 0.2);
            border-color: rgba(0, 255, 200, 0.6);
        }

        .tool-label {
            position: absolute;
            bottom: 64px;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            white-space: nowrap;
            font-size: 0.8rem;
            color: rgba(0, 255, 200, 0.9);
            background: rgba(0, 0, 0, 0.85);
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 200, 0.3);
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 201;
        }

        .tool-label::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border: 8px solid transparent;
            border-top-color: rgba(0, 0, 0, 0.85);
        }

        .tool-btn:hover .tool-label {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .scroll-indicator svg {
            animation: bounce 1s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(4px); }
        }

        /* 响应式 */
        @media (max-width: 1024px) {
            .capsules-container {
                max-width: 600px;
            }

            .timeline-core,
            .timeline-glow {
                left: 30px;
                transform: none;
            }

            .capsule-wrapper {
                justify-content: flex-start;
                padding-left: 60px;
            }

            .capsule-node {
                position: absolute;
                left: 18px;
            }

            .time-capsule:nth-child(odd) .capsule-card,

            const names = {

        function createCapsule(log, index) {
            const capsule = document.createElement('div');
            capsule.className = 'time-capsule';
            capsule.dataset.category = log.category;
            capsule.dataset.index = index;

            capsule.innerHTML = `

                                </span>

                            </div>

                        </div>
                        <div class="capsule-body">

                            <div class="capsule-actions">

                            </div>

                            </svg>
                        </div>
                    </div>
                    <div class="capsule-node"></div>
                </div>
            `;

            const card = capsule.querySelector('.capsule-card');
            card.addEventListener('click', () => {
                card.classList.toggle('expanded');
            });

            return capsule;
        }

        function renderCategories() {
            categoryOrbit.innerHTML = '';
            categories.forEach(cat => {
                const node = document.createElement('div');
                node.className = 'orbit-node' + (cat.id === 'all' ? ' active' : '');
                node.dataset.category = cat.id;
                node.innerHTML = `<span class="orbit-label">${cat.icon} ${cat.name}</span>`;
                node.addEventListener('click', () => filterByCategory(cat.id));
                categoryOrbit.appendChild(node);
            });
        }

        function renderCapsules() {
            capsulesList.innerHTML = '';
            logs.forEach((log, index) => {
                capsulesList.appendChild(createCapsule(log, index));
            });
            totalPagesEl.textContent = String(logs.length).padStart(2, '0');
        }

        function filterByCategory(category) {
            document.querySelectorAll('.orbit-node').forEach(node => {
                node.classList.toggle('active', node.dataset.category === category);
            });

            const capsules = document.querySelectorAll('.time-capsule');
            capsules.forEach(capsule => {
                const card = capsule.querySelector('.capsule-card');
                if (category === 'all' || capsule.dataset.category === category) {
                    capsule.style.display = '';

                } else {
                    capsule.style.opacity = '0.2';
                    capsule.style.transform = 'scale(0.95)';
                }
            });
        }

        function updatePageIndicator() {
            const capsules = document.querySelectorAll('.time-capsule');
            const scrollY = window.scrollY + window.innerHeight / 2;

            capsules.forEach((capsule, index) => {
                const rect = capsule.getBoundingClientRect();
                const capsuleY = window.scrollY + rect.top + rect.height / 2;

                if (Math.abs(scrollY - capsuleY) < rect.height) {
                    currentPageEl.textContent = String(index + 1).padStart(2, '0');
                }
            });
        }

        // 粒子效果
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2,
                color: `hsla(${170 + Math.random() * 40}, 100%, 60%, `
            };
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(createParticle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color + p.alpha + ')';
                ctx.fill();

                particles.forEach(other => {
                    const dx = p.x - other.x;
                    const dy = p.y - other.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(other.x, other.y);
                        ctx.strokeStyle = `rgba(0, 255, 200, ${0.15 * (1 - dist / 150)})`;
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
