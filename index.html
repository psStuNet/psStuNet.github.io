        const categories = [
            { id: 'all', name: '全部', icon: '📋' },

        const capsulesList = document.getElementById('capsulesList');
        const categoryOrbit = document.getElementById('categoryOrbit');
        const currentPageEl = document.getElementById('currentPage');
        const totalPagesEl = document.getElementById('totalPages');

        function getCategoryName(category) {
            const names = {
                report: '月度报告',
                progress: '项目进展',
                bugfix: 'Bug修复',
                server: '服务器',
                github: 'GitHub'
            };
            return names[category] || category;
        }

        function createCapsule(log, index) {
            const capsule = document.createElement('div');
            capsule.className = 'time-capsule';
            capsule.dataset.category = log.category;
            capsule.dataset.index = index;

            capsule.innerHTML = `
                <div class="capsule-wrapper">
                    <div class="capsule-card" style="--color-1: ${log.colors[0]}; --color-2: ${log.colors[1]}">
                        <div class="capsule-icon">${log.icon}</div>
                        <div class="capsule-header">
                            <div class="capsule-bg"></div>
                            <div class="capsule-meta">
                                <span class="capsule-category">
                                    ${log.icon}
                                    ${getCategoryName(log.category)}
                                </span>
                                <span class="capsule-date">${log.date}</span>
                            </div>
                            <h2 class="capsule-title">${log.title}</h2>
                        </div>
                        <div class="capsule-body">
                            <p class="capsule-desc">${log.desc}</p>
                            <div class="capsule-content">${log.content}</div>
                            <div class="capsule-actions">
                                ${log.link ? `<a href="${log.link}" class="btn btn-primary" ${log.link.startsWith('http') ? 'target="_blank"' : ''} onclick="event.stopPropagation()">查看完整内容</a>` : ''}
                            </div>
                        </div>
                        <div class="expand-hint">
                            <span>点击展开</span>
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M6 9l6 6 6-6"/>
                            </svg>
                        </div>
                    </div>
                    <div class="capsule-node"></div>
                </div>
            `;

            const card = capsule.querySelector('.capsule-card');
            card.addEventListener('click', () => {
                card.classList.toggle('expanded');
            });

            return capsule;
        }

        function renderCategories() {
            categoryOrbit.innerHTML = '';
            categories.forEach(cat => {
                const node = document.createElement('div');
                node.className = 'orbit-node' + (cat.id === 'all' ? ' active' : '');
                node.dataset.category = cat.id;
                node.innerHTML = `<span class="orbit-label">${cat.icon} ${cat.name}</span>`;
                node.addEventListener('click', () => filterByCategory(cat.id));
                categoryOrbit.appendChild(node);
            });
        }

        function renderCapsules() {
            capsulesList.innerHTML = '';
            logs.forEach((log, index) => {
                capsulesList.appendChild(createCapsule(log, index));
            });
            totalPagesEl.textContent = String(logs.length).padStart(2, '0');
        }

        function filterByCategory(category) {
            document.querySelectorAll('.orbit-node').forEach(node => {
                node.classList.toggle('active', node.dataset.category === category);
            });

            const capsules = document.querySelectorAll('.time-capsule');
            capsules.forEach(capsule => {
                const card = capsule.querySelector('.capsule-card');
                if (category === 'all' || capsule.dataset.category === category) {
                    capsule.style.display = '';
                    capsule.style.opacity = '1';
                    capsule.style.transform = 'scale(1)';
                } else {
                    capsule.style.opacity = '0.2';
                    capsule.style.transform = 'scale(0.95)';
                }
            });
        }

        function updatePageIndicator() {
            const capsules = document.querySelectorAll('.time-capsule');
            const scrollY = window.scrollY + window.innerHeight / 2;

            capsules.forEach((capsule, index) => {
                const rect = capsule.getBoundingClientRect();
                const capsuleY = window.scrollY + rect.top + rect.height / 2;

                if (Math.abs(scrollY - capsuleY) < rect.height) {
                    currentPageEl.textContent = String(index + 1).padStart(2, '0');
                }
            });
        }

        // 粒子效果
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            return {
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5 + 0.2,
                color: `hsla(${170 + Math.random() * 40}, 100%, 60%, `
            };
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(createParticle());
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;

                if (p.x < 0) p.x = canvas.width;
                if (p.x > canvas.width) p.x = 0;
                if (p.y < 0) p.y = canvas.height;
                if (p.y > canvas.height) p.y = 0;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fillStyle = p.color + p.alpha + ')';
                ctx.fill();

                particles.forEach(other => {
                    const dx = p.x - other.x;
                    const dy = p.y - other.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(other.x, other.y);
                        ctx.strokeStyle = `rgba(0, 255, 200, ${0.15 * (1 - dist / 150)})`;
                        ctx.stroke();
                    }
                });
            });

            requestAnimationFrame(animateParticles);
        }

        resizeCanvas();
        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            resizeCanvas();
            initParticles();
        });

                shape.style.height = size + 'px';
                Object.assign(shape.style, pos);
                shape.style.animationDelay = (i * 2) + 's';
                shape.style.animationDuration = (15 + Math.random() * 10) + 's';
                container.appendChild(shape);
            });
        }

                { top: '55%', right: '85%' },
                { top: '65%', right: '95%' }

            positions.forEach((pos, i) => {

                shape.className = `float-shape ${shapes[i % 2]}`;
                shape.style.cssText = `
                    top: ${pos.top}px;
                    left: ${pos.left}px;
                    width: ${pos.size}px;
                    height: ${pos.size}px;
                    animation-delay: ${i * 2}s;
                    animation-duration: ${15 + Math.random() * 10}s;
                `;
            });
        }
